name: Release Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build production extension
        run: yarn build:prod

      - name: Package release zip
        shell: pwsh
        run: ./script/package-release.ps1

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: 7tvfixed
          path: release-builds/7tvfixed.zip

      - name: Prepare release notes
        shell: pwsh
        run: |
          $repo = "${{ github.repository }}"
          $patchnotesUrl = "https://github.com/$repo/blob/main/patchnotes.txt"
          $updated = Get-Date -Format "dd/MM/yyyy"
          @"
          If you want to view the patchnotes, you can here: [patchnotes.txt]($patchnotesUrl)
          
          Last updated [$updated]
          "@ | Set-Content "./release-builds/release-notes.txt"

      - name: Recreate rolling release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $repo = "${{ github.repository }}"
          $stableTag = "7tvfixed"
          $releases = gh release list --repo $repo --limit 100 --json tagName | ConvertFrom-Json

          foreach ($release in $releases) {
            if ($release.tagName -ne $stableTag) {
              gh release delete $release.tagName --repo $repo --cleanup-tag -y
            }
          }

          gh release view $stableTag --repo $repo *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release delete $stableTag --repo $repo --cleanup-tag -y
          }

          gh release create $stableTag "release-builds/7tvfixed.zip" `
            --repo $repo `
            --title "7tvfixed" `
            --notes-file "./release-builds/release-notes.txt" `
            --latest
